<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Products (Bulk)</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="asset/icon.png" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Inventory Matrix</h1>
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="view-products.html">View Products</a>
        <a href="add-products.html" class="active">Add Products</a>
        <a href="price-calculator.html">Price Calculator</a>
      </nav>
    </header>

    <div class="bulk-container">
      <h2>Bulk Item Intake Workspace</h2>
      <form id="bulkForm">
        <div class="scrollbox">
          <table class="entry-table">
            <thead>
              <tr>
                <th class="th-code">Code (Optional)</th>
                <th class="th-name">Name *</th>
                <th class="th-color">Color</th>
                <th class="th-loc">Location</th>
                <th class="th-brand">Brand</th>
                <th class="th-dim">Length (cm)</th>
                <th class="th-dim">Width (cm)</th>
                <th class="th-dim">Height (cm)</th>
                <th class="th-dim">Mass (g)</th>
                <th class="th-dim">Price (Rp)</th>
                <th class="th-dim">Qty *</th>
                <th class="th-act">Action</th>
              </tr>
            </thead>
            <tbody id="bulkTemplateBody"></tbody>
          </table>
        </div>

        <div class="action-bar">
          <button type="button" id="btnAddRow" class="btn-add-row">
            + Add Row
          </button>
          <button type="submit" class="btn-save-all">
            Save All Items to Cloud
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
